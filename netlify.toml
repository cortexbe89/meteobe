# MétéoBE — v2.5 — 2026-05-20

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self)"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com https://unpkg.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://tilecache.rainviewer.com https://*.openstreetmap.org; connect-src 'self' https://api.open-meteo.com https://air-quality-api.open-meteo.com https://api.rainviewer.com https://nominatim.openstreetmap.org https://api.anthropic.com https://api.openweathermap.org https://api.rss2json.com https://feeds.meteoalarm.org; font-src 'self' https://fonts.gstatic.com; frame-src https://embed.windy.com; worker-src blob:;"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
