<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fond dégradé -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1e38"/>
      <stop offset="100%" style="stop-color:#0b1120"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Fond arrondi avec marge (maskable safe zone = 80% = 204px de rayon) -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- Halo décoratif -->
  <circle cx="380" cy="130" r="140" fill="rgba(56,189,248,0.07)"/>

  <!-- Texte "Météo" petit en haut -->
  <text x="256" y="168"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="72"
    font-weight="400"
    fill="rgba(255,255,255,0.55)"
    text-anchor="middle"
    letter-spacing="8">MÉTÉO</text>

  <!-- Grande lettre "B" et "E" stylisées -->
  <text x="256" y="342"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="210"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    letter-spacing="-4">BE</text>

  <!-- Barre accent bleue en bas -->
  <rect x="136" y="390" width="240" height="8" rx="4" fill="url(#accent)"/>

  <!-- Petits points décoratifs (étoiles météo) -->
  <circle cx="130" cy="145" r="5" fill="#38bdf8" opacity="0.7"/>
  <circle cx="155" cy="118" r="3" fill="#38bdf8" opacity="0.5"/>
  <circle cx="108" cy="175" r="3" fill="#38bdf8" opacity="0.4"/>
</svg>
